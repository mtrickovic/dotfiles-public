# ============================================================
# picom configuration — glass/acrylic effect for xterm
# Location: ~/.config/picom/picom.conf (or ~/.config/picom.conf)
# Run with: picom --config ~/.config/picom/picom.conf
# Add "exec --no-startup-id picom --config ~/.config/picom/picom.conf"
# to ~/.config/i3/config if not already running picom.
# ============================================================

# ------------------------------------------------------------
# Backend — required for blur. glx is fastest; xrender is the
# safe fallback if you hit GPU/driver issues.
# ------------------------------------------------------------
backend = "glx";
vsync = true;

# ------------------------------------------------------------
# Blur — this is the actual "acrylic" effect.
# dual_kawase is cheap and looks closest to Windows Acrylic /
# macOS vibrancy. Bump "strength" for a heavier frost.
# ------------------------------------------------------------
blur: {
  method = "dual_kawase";
  strength = 7;
  background = false;
  background-frame = false;
  background-fixed = false;
}

# Note: this box runs uxterm (the UTF-8 xterm wrapper), whose
# WM_CLASS is "UXTerm", not "XTerm" — confirmed via `xprop`.
# All class-scoped rules below target 'UXTerm' accordingly.

# Only blur windows that are actually transparent — otherwise
# picom tries to blur fully opaque windows too, wasting GPU.
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# ------------------------------------------------------------
# Opacity rules — scoped to xterm's WM_CLASS so the rest of
# your windows stay untouched. xterm*opacity in ~/.Xresources
# sets the base value; this reinforces it at the compositor.
# ------------------------------------------------------------
opacity-rule = [
  "80:class_g = 'UXTerm'"
];

# Slight fade in/out feels less jarring on a translucent panel
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;

# ------------------------------------------------------------
# Rounded corners — picom-level, not xterm-level. xterm has no
# concept of corners; this is purely compositor window shaping.
# Only apply to xterm so i3's tiled layout elsewhere is untouched.
# ------------------------------------------------------------
corner-radius = 8;
rounded-corners-exclude = [
  "class_g != 'UXTerm'"
];

# ------------------------------------------------------------
# Shadow — completes the "floating glass pane" look. Keep it
# soft; a hard shadow reads as a flat card, not glass.
# ------------------------------------------------------------
shadow = true;
shadow-radius = 16;
shadow-opacity = 0.45;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# ------------------------------------------------------------
# General
# ------------------------------------------------------------
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

wintypes: {
  tooltip = { fade = true; shadow = false; opacity = 0.9; }
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.9; }
  dropdown_menu = { opacity = 0.9; }
};
